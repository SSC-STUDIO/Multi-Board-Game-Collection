name: Tests

'on':
  push:
    branches: [main, master, 'codex/ai-**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Module syntax check
        run: npm run check

      - name: Run tests
        run: npm test
